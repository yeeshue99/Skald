name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # the app is fully dynamic (cookie-based), so build needs no real DB; a
      # dummy URL just satisfies the lazy pool constructor.
      - run: pnpm build
        env:
          DATABASE_URL: postgresql://invalid:invalid@127.0.0.1:5432/invalid
